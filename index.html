<!-- CREA TU PROPIO JUGO -->
<section id="custom-juice" class="custom-section">
  <div class="container">
    <h2>Crea tu propio jugo</h2>
    <p class="section-subtitle">
      Escoge tus ingredientes favoritos, selecciona tu método de entrega y envíanos tu orden directamente por WhatsApp.
    </p>

    <div class="custom-form-wrap">
      <form id="customJuiceForm" class="custom-form-grid">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Tu nombre</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre" />
          </div>

          <div class="form-group">
            <label for="telefono">Tu teléfono</label>
            <input type="text" id="telefono" placeholder="Ej. 787-000-0000" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="tamano">Tamaño</label>
            <select id="tamano">
              <option value="">Selecciona un tamaño</option>
              <option value="12 oz">12 oz</option>
              <option value="16 oz">16 oz</option>
              <option value="Shot">Shot</option>
            </select>
          </div>

          <div class="form-group">
            <label for="cantidad">Cantidad</label>
            <select id="cantidad">
              <option value="">Selecciona cantidad</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10+">10+</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Ingredientes</label>
          <div class="ingredients-checklist">
            <label class="ingredient-option"><input type="checkbox" value="Manzana verde" /> Manzana verde</label>
            <label class="ingredient-option"><input type="checkbox" value="Manzana roja" /> Manzana roja</label>
            <label class="ingredient-option"><input type="checkbox" value="Piña" /> Piña</label>
            <label class="ingredient-option"><input type="checkbox" value="Jengibre" /> Jengibre</label>
            <label class="ingredient-option"><input type="checkbox" value="Cúrcuma" /> Cúrcuma</label>
            <label class="ingredient-option"><input type="checkbox" value="Zanahoria" /> Zanahoria</label>
            <label class="ingredient-option"><input type="checkbox" value="Remolacha" /> Remolacha</label>
            <label class="ingredient-option"><input type="checkbox" value="Espinaca" /> Espinaca</label>
            <label class="ingredient-option"><input type="checkbox" value="Fresas" /> Fresas</label>
            <label class="ingredient-option"><input type="checkbox" value="Mango" /> Mango</label>
            <label class="ingredient-option"><input type="checkbox" value="Celery" /> Celery</label>
            <label class="ingredient-option"><input type="checkbox" value="Guineo" /> Guineo</label>
            <label class="ingredient-option"><input type="checkbox" value="Limón" /> Limón</label>
            <label class="ingredient-option"><input type="checkbox" value="China" /> China</label>
            <label class="ingredient-option"><input type="checkbox" value="Apio" /> Apio</label>
            <label class="ingredient-option"><input type="checkbox" value="Pepino" /> Pepino</label>
          </div>
        </div>

        <div class="form-group">
          <label for="extraIngredient">Otro ingrediente</label>
          <input type="text" id="extraIngredient" placeholder="Ej. pera, kiwi, avena..." />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="entregaTipo">Método de entrega</label>
            <select id="entregaTipo" onchange="actualizarEntrega()">
              <option value="">Selecciona una opción</option>
              <option value="Pickup en Montehiedra Mall">Pickup en Montehiedra Mall</option>
              <option value="Envío por correo">Envío por correo</option>
            </select>
          </div>

          <div class="form-group">
            <label for="fechaEntrega">Fecha deseada</label>
            <input type="date" id="fechaEntrega" />
          </div>
        </div>

        <div class="form-group" id="deliveryInfoBox" style="display:none;">
          <label id="deliveryLabel" for="lugarEntrega">Punto de entrega</label>
          <input type="text" id="lugarEntrega" placeholder="" />
          <p id="deliveryHelpText" style="margin-top:8px; font-size:0.92rem; color:#7a746e;"></p>
        </div>

        <div class="form-group">
          <label for="notas">Notas adicionales</label>
          <textarea id="notas" rows="4" placeholder="Ej. sin jengibre, más piña, poco dulce, tocar bocina al llegar..."></textarea>
        </div>

        <div class="custom-buttons">
          <button type="button" class="btn-primary" onclick="enviarJugoWhatsApp()">
            Enviar pedido por WhatsApp
          </button>

          <button type="reset" class="btn-outline" onclick="resetEntrega()">
            Limpiar
          </button>
        </div>

        <p class="form-note">
          Tu selección se convertirá en un mensaje listo para enviar por WhatsApp.
        </p>
      </form>
    </div>
  </div>
</section>
