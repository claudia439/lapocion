<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Poción</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.25)
      ), url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #3d2a1a;
    }

    .hero {
      text-align: center;
      padding: 70px 20px 50px;
      color: white;
    }

    .hero img.logo {
      max-width: 260px;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: 46px;
    }

    .hero p {
      max-width: 760px;
      margin: 14px auto 0;
      line-height: 1.7;
    }

    .hero-buttons {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 14px;
      background: #3d2a1a;
      color: white;
      text-decoration: none;
    }

    .btn-outline {
      background: white;
      color: #3d2a1a;
      padding: 14px 22px;
      border-radius: 14px;
      text-decoration: none;
    }

    .section {
      padding: 50px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card-body {
      padding: 20px;
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    .button {
      display: block;
      text-align: center;
      background: #3d2a1a;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 10px;
    }

    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img class="logo" src="./logo.png" />
    <h1>La Poción</h1>
    <p>La magia está en los ingredientes ✨</p>

    <div class="hero-buttons">
      <a class="btn" href="#">Ordenar por WhatsApp</a>
      <a class="btn-outline" href="#">Crear mi jugo</a>
    </div>
  </section>

  <section class="section">
    <h2 style="text-align:center;">Jugos disponibles</h2>

    <div class="grid">

      <div class="card">
        <img src="./glow-verde.png">
        <div class="card-body">
          <h3>Glow Verde</h3>
          <div class="price">$7</div>
          <a class="button" href="#">Ordenar</a>
        </div>
      </div>

      <div class="card">
        <img src="./golden-boost.png">
        <div class="card-body">
          <h3>Golden Boost</h3>
          <div class="price">$8</div>
          <a class="button" href="#">Ordenar</a>
        </div>
      </div>

      <div class="card">
        <img src="./berry-power.png">
        <div class="card-body">
          <h3>Berry Power</h3>
          <div class="price">$8</div>
          <a class="button" href="#">Ordenar</a>
        </div>
      </div>

    </div>
  </section>

  <a class="whatsapp-float" href="#">Ordenar</a>

</body>
</html>
